backend:
  name: github
  repo: JDavis0535/carowebsite
  branch: main
  base_url: https://caroscarfs.netlify.app
  auth_endpoint: /.netlify/functions/auth

# Where uploaded photos are saved in the repo, and how the site refers to them
media_folder: "public/images/scarves"
public_folder: "/images/scarves"

publish_mode: simple

collections:
  - name: scarves
    label: Scarves
    label_singular: Scarf
    folder: "src/data/scarves"
    create: true
    delete: true
    extension: json
    format: json
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}} — ${{price}}"
    fields:
      - { name: name, label: "Name", widget: string }
      - { name: price, label: "Price ($)", widget: number, value_type: int, min: 0 }
      - { name: inStock, label: "In stock?", widget: boolean, default: true }
      - name: image
        label: "Main photo — the scarf itself"
        widget: image
        choose_url: true
        hint: "A clear photo of just the scarf. This is the cover image shown on the store tiles."
      - name: gallery
        label: "Extra photos — dogs wearing it"
        widget: list
        required: false
        hint: "Photos of dogs modelling this scarf. Shown as a gallery on the scarf's own page."
        field: { name: image, label: "Photo", widget: image }
      - { name: color, label: "Colour", widget: string, required: false }
      - name: material
        label: "Materials"
        widget: text
        required: false
        hint: "Fabric details — put each on its own line if you like (e.g. Flannel: 65% polyester, 35% cotton)."
      - { name: description, label: "Description", widget: text, required: false }
